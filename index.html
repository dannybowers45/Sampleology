<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sampleology</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --surface: #111827;
            --surface-raised: #1a2235;
            --border: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(234, 179, 8, 0.3);
            --accent: #eab308;
            --accent-hover: #ca9a06;
            --accent-subtle: rgba(234, 179, 8, 0.08);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --green: #22c55e;
            --green-subtle: rgba(34, 197, 94, 0.1);
            --red: #ef4444;
            --red-subtle: rgba(239, 68, 68, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-container {
            max-width: 520px;
            width: 100%;
            padding: 20px;
            flex: 1;
        }

        /* Header */
        .site-header {
            padding: 24px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .site-header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .site-header h1 span {
            color: var(--accent);
        }
        .site-header p {
            color: var(--text-secondary);
            font-size: 0.8125rem;
            margin-top: 4px;
        }

        /* Panels */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .sample-panel {
            border-left: 3px solid var(--accent);
        }

        .panel-title {
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        /* Artwork */
        .artwork-container {
            width: 72px;
            height: 72px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface-raised);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .artwork-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .artwork-placeholder {
            color: var(--text-dim);
            font-size: 1.5rem;
        }

        /* Buttons */
        .accent-button {
            background: var(--accent);
            color: #1a1a00;
            font-weight: 600;
            font-size: 0.8125rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .accent-button:hover:not(:disabled) {
            background: var(--accent-hover);
        }
        .accent-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .secondary-button {
            background: transparent;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.8125rem;
            border-radius: 8px;
            border: 1px solid var(--border-accent);
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .secondary-button:hover:not(:disabled) {
            background: var(--accent-subtle);
        }
        .secondary-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ghost-button {
            background: transparent;
            color: var(--text-secondary);
            font-weight: 500;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: background 0.15s ease, color 0.15s ease;
            cursor: pointer;
            font-size: 0.8125rem;
            padding: 8px 14px;
        }
        .ghost-button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }
        .ghost-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Labels & Inputs */
        label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.8125rem;
        }

        .input-field {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            width: 100%;
            transition: border-color 0.15s ease;
            font-size: 0.875rem;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--accent);
        }
        .input-field::placeholder { color: var(--text-dim); }
        .input-field:disabled { opacity: 0.5; }

        .input-field.input-correct {
            border-color: var(--green);
        }
        .input-field.input-incorrect {
            border-color: var(--red);
        }

        /* Timer */
        #timer-bar {
            height: 4px;
            background-color: var(--surface-raised);
            overflow: hidden;
            border-radius: 2px;
        }
        #progress-fill {
            height: 100%;
            width: 100%;
            background: var(--accent);
            transition: width 0.1s linear;
        }
        #progress-fill.urgent {
            background: var(--red);
        }

        /* Stats */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .stat-chip {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 10px;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .stat-label {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text);
        }

        /* Status message */
        .status-message {
            min-height: 44px;
            padding: 12px;
            background: var(--surface-raised);
            border-radius: 8px;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.8125rem;
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .status-message.correct {
            border-color: rgba(34, 197, 94, 0.3);
            background: var(--green-subtle);
            color: var(--green);
        }
        .status-message.incorrect {
            border-color: rgba(239, 68, 68, 0.3);
            background: var(--red-subtle);
            color: var(--red);
        }
        .status-message.status-info {
            border-color: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }
        .status-message.status-neutral {
            color: var(--text-secondary);
        }

        /* Setup screen */
        .setup-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-group-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            font-weight: 600;
        }
        .option-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .option-chip {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8125rem;
            font-weight: 500;
            transition: all 0.15s ease;
        }
        .option-chip:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }
        .option-chip.selected {
            background: var(--accent-subtle);
            border-color: var(--border-accent);
            color: var(--accent);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shakeX {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }
        .anim-fade-in { animation: fadeIn 0.25s ease-out; }
        .anim-shake { animation: shakeX 0.35s ease-in-out; }
        .anim-pulse { animation: pulse 0.3s ease-in-out; }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-content {
            max-width: 440px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        /* Leaderboard */
        .lb-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
        }
        .lb-row:nth-child(1) { border-color: var(--border-accent); }
        .lb-rank { font-weight: 700; color: var(--accent); min-width: 28px; font-size: 0.875rem; }
        .lb-name { flex: 1; margin-left: 8px; color: var(--text); font-size: 0.875rem; }
        .lb-score { font-weight: 700; color: var(--text); font-size: 0.875rem; }
        .lb-details { font-size: 0.6875rem; color: var(--text-dim); margin-left: 8px; }

        /* Missed answers */
        .missed-list {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .missed-item {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            padding: 6px 10px;
            background: var(--red-subtle);
            border-radius: 6px;
            border-left: 2px solid var(--red);
        }

        /* Screens */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Footer */
        .site-footer {
            padding: 20px 0;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            width: 100%;
            max-width: 520px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .game-container { padding: 16px; }
            .stat-grid { gap: 6px; }
            .artwork-container { width: 56px; height: 56px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <header class="site-header">
            <h1><span>Sample</span>ology</h1>
            <p>Guess the song that sampled the track you hear</p>
        </header>

        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="screen active space-y-5">
            <div class="setup-section">
                <p class="option-group-label">Your Name</p>
                <input type="text" id="player-name-input" placeholder="Enter your name" class="input-field" autocomplete="off">
            </div>
            <div class="setup-section">
                <p class="option-group-label">Difficulty</p>
                <div class="option-grid" id="difficulty-select">
                    <button class="option-chip selected" data-difficulty="full">Full (92)</button>
                    <button class="option-chip" data-difficulty="easy">Easy (22)</button>
                </div>
            </div>
            <div class="setup-section">
                <p class="option-group-label">Genre</p>
                <div class="option-grid" id="genre-select">
                    <!-- Populated by JS -->
                </div>
            </div>
            <button id="start-game-button" class="accent-button w-full flex justify-center items-center gap-2 py-2.5 px-5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.26a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>Start Game</span>
            </button>
            <button id="show-leaderboard-btn" class="ghost-button w-full">View Leaderboard</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="screen space-y-4">

            <div class="panel sample-panel p-4">
                <p class="panel-title mb-2">Original Sample</p>
                <div class="flex items-start gap-3">
                    <div class="artwork-container" id="artwork-container">
                        <span class="artwork-placeholder">&#9835;</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div id="play-info" class="text-sm text-slate-300">Loading...</div>
                        <div class="flex items-center gap-2 mt-2">
                            <button id="play-button"
                                class="accent-button flex justify-center items-center gap-2 py-2 px-4 text-sm"
                                disabled>
                                <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path id="play-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.26a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                <span id="button-text">PLAYING...</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="timer-bar">
                <div id="progress-fill" style="width: 100%; transition: none;"></div>
            </div>

            <div class="space-y-3">
                <div>
                    <label for="guess-title-input" class="block mb-1.5">Song Title</label>
                    <input type="text" id="guess-title-input" placeholder="e.g., California Love" class="input-field" disabled autocomplete="off">
                </div>
                <div>
                    <label for="guess-artist-input" class="block mb-1.5">Artist</label>
                    <input type="text" id="guess-artist-input" placeholder="e.g., 2pac" class="input-field" disabled autocomplete="off">
                </div>
            </div>
            <div class="flex gap-2">
                <button id="submit-button" class="secondary-button flex-1 py-2.5 px-5" disabled>Submit Guess</button>
                <button id="hint-button" class="ghost-button py-2.5 px-3" disabled>Hint</button>
                <button id="skip-button" class="ghost-button py-2.5 px-3" disabled>Skip</button>
            </div>

            <div class="panel mt-3 p-4 space-y-3">
                <div class="stat-grid">
                    <div class="stat-chip">
                        <span class="stat-label">Score</span>
                        <span id="current-score" class="stat-value">0</span>
                    </div>
                    <div class="stat-chip">
                        <span class="stat-label">Round</span>
                        <span id="current-round" class="stat-value">0</span>
                    </div>
                    <div class="stat-chip">
                        <span class="stat-label">Streak</span>
                        <span id="current-streak" class="stat-value">0</span>
                    </div>
                </div>
                <div id="message-box" class="status-message status-neutral">
                    Loading game...
                </div>
            </div>
        </div>

        <footer class="site-footer">
            Idea inspired by gj
        </footer>
    </div>

    <!-- MODAL CONTAINER -->
    <div id="modal-container"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
